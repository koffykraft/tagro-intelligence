<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>TAGRO - Login</title>
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body data-page="login">
<main class="login-wrap">
  <div class="login-logo"><img src="assets/images/tagro-logo.png" alt="TAGRO"></div>
  <div class="sub" style="text-align:center;letter-spacing:5px;font-weight:950;text-transform:uppercase">Service Centre</div>

  <div class="card" style="margin-top:30px">
    
    <!-- Step 1: Branch -->
    <div class="card-head">
      <h2>1. Select Branch</h2>
      <span class="pill">Tap to select</span>
    </div>
    <div class="body">
      <!-- Hidden inputs keep your existing app.js login() function working perfectly -->
      <input type="hidden" id="branch" value="">
      <input type="hidden" id="staff" value="">

      <!-- Intuitive Grid replaces clunky select -->
      <div class="grid3" id="branchButtons">
        <button type="button" class="btn branch-btn" onclick="pickBranch('KVR', this)">KVR</button>
        <button type="button" class="btn branch-btn" onclick="pickBranch('MDM', this)">MDM</button>
        <button type="button" class="btn branch-btn" onclick="pickBranch('PKM', this)">PKM</button>
        <button type="button" class="btn branch-btn" onclick="pickBranch('SKT', this)">SKT</button>
        <button type="button" class="btn branch-btn" onclick="pickBranch('NDD', this)">NDD</button>
        <button type="button" class="btn branch-btn" onclick="pickBranch('OYR', this)">OYR</button>
        <button type="button" class="btn branch-btn" onclick="pickBranch('SDM', this)">SDM</button>
        <button type="button" class="btn branch-btn" onclick="pickBranch('OWNER', this)">OWNER</button>
      </div>
    </div>

    <!-- Step 2: Staff (Hidden until branch is selected) -->
    <div id="staffSection" class="hidden">
      <div class="card-head" style="border-top:1px solid #eee;">
        <h2>2. Who is this?</h2>
        <span class="pill green">No typing</span>
      </div>
      <div class="body">
        <div class="grid2" id="staffButtons">
          <!-- Javascript will dynamically inject staff buttons here -->
        </div>

        <!-- Step 3: PIN (Hidden until staff is selected) -->
        <div id="pinSection" class="hidden" style="margin-top:20px; padding-top:20px; border-top:1px dashed var(--line);">
          <label for="pin">Enter PIN</label>
          <!-- Using password + numeric pattern summons the large native phone number pad -->
          <input id="pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="PIN / SMS PIN later">

          <button type="button" class="btn primary block" style="margin-top:16px" onclick="login()">Login</button>
        </div>
      </div>
    </div>

  </div>
  
  <div style="text-align:center;">
    <button type="button" style="background:transparent; border:none; color:var(--muted); font-weight:950; cursor:pointer; padding:10px;" onclick="login(true)">
      Bypass with Demo Mode
    </button>
  </div>
</main>

<script src="assets/js/app.js"></script>
<script>
  // Handles the progressive UI selection
  function pickBranch(branchCode, btnElement) {
    document.getElementById('branch').value = branchCode;
    
    // Visual feedback for selected branch
    document.querySelectorAll('.branch-btn').forEach(btn => btn.classList.remove('primary'));
    btnElement.classList.add('primary');

    // Reveal staff section and hide PIN (forces sequential flow)
    document.getElementById('staffSection').classList.remove('hidden');
    document.getElementById('pinSection').classList.add('hidden'); 
    document.getElementById('staff').value = ''; 

    // Generate Staff buttons based on branch
    const staffList = STAFF[branchCode] || [];
    const staffGrid = document.getElementById('staffButtons');
    
    let html = staffList.map(name => 
      `<button type="button" class="btn staff-btn" onclick="pickStaff('${name}', this)">${name}</button>`
    ).join("");
    
    // Add the "New User" button at the end of the list
    html += `<button type="button" class="btn soft staff-btn" onclick="promptNewUser()">+ New User</button>`;
    
    staffGrid.innerHTML = html;
  }

  function pickStaff(name, btnElement) {
    document.getElementById('staff').value = name;
    
    // Visual feedback for selected staff
    document.querySelectorAll('.staff-btn').forEach(btn => btn.classList.remove('selected'));
    btnElement.classList.add('selected');

    // Reveal PIN section and auto-focus the input to summon the keyboard instantly
    document.getElementById('pinSection').classList.remove('hidden');
    
    // Slight timeout allows the UI to render before focusing the keyboard
    setTimeout(() => document.getElementById('pin').focus(), 50);
  }

  // Feature: Add a new user dynamically to the current branch
  function promptNewUser() {
    const newName = prompt("Enter the new staff member's name:");
    if (newName && newName.trim() !== "") {
       const branch = document.getElementById('branch').value;
       
       // Ensure the branch array exists, then push the new name
       if (!STAFF[branch]) STAFF[branch] = [];
       STAFF[branch].push(newName.trim());
       
       // Re-click the active branch button to refresh the UI and show the new name
       document.querySelector('.branch-btn.primary').click();
    }
  }
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f4f2ef">
  <title>TAGRO Service</title>
  
  <link rel="stylesheet" href="assets/css/app.css">
  
  <script>
    // Smart Routing: Check for an active session before redirecting
    setTimeout(() => {
      try {
        const session = JSON.parse(localStorage.getItem("tagroSession"));
        // If a session exists, bypass login and go straight to the shop floor
        const target = session ? "home.html" : "login.html";
        window.location.replace(target);
      } catch (e) {
        window.location.replace("login.html");
      }
    }, 100); // 100ms delay ensures the splash screen flashes just long enough to feel deliberate
  </script>
  
  <noscript>
    <meta http-equiv="refresh" content="0;url=login.html">
  </noscript>

  <style>
    /* Minimal inline styles to perfectly center the splash screen */
    .splash-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--line);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto 16px;
    }
    @keyframes spin { 
      100% { transform: rotate(360deg); } 
    }
  </style>
</head>
<body data-page="index">
  
  <main class="splash-wrap">
    <div class="login-logo">
      <img src="assets/images/tagro-logo.png" alt="TAGRO" style="height: 76px; max-width: 92%;">
    </div>
    
    <div class="spinner" aria-hidden="true"></div>
    
    <div class="sub" style="font-weight:950; letter-spacing:3px; text-transform:uppercase; font-size:12px;">
      Loading Workshop
    </div>

    <noscript>
      <div class="card" style="margin-top: 30px; text-align: center; width: 100%; max-width: 320px;">
        <div class="body">
          <div class="small" style="margin-bottom: 16px;">JavaScript is required to run TAGRO.</div>
          <a href="login.html" class="btn primary block">Continue to Login</a>
        </div>
      </div>
    </noscript>
  </main>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>TAGRO - My Bench</title>
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body data-page="bench">
<header class="shell-header">
  <a class="logo" href="home.html" aria-label="Home">
    <img src="assets/images/tagro-logo.png" alt="TAGRO">
  </a>
  <span class="branch-pill" id="branchBadge">KVR</span>
  <span class="user-pill" id="userBadge">Staff</span>
</header>

<main>
  <div class="card">
    <div class="body">
      <h1 class="hero" style="margin-top:0;">My Bench</h1>
      <div class="sub">Protect concentration. One current machine. Everything else waits clearly.</div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2>Current work</h2>
      <span class="pill">Resume first</span>
    </div>
    <div class="body" id="currentJob" aria-live="polite">
      </div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2>Paused / waiting</h2>
      <span class="pill amber">not forgotten</span>
    </div>
    <div class="body" id="pausedJobs" aria-live="polite">
      </div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2>Waiting inspection</h2>
      <span class="pill">small window</span>
    </div>
    <div class="body" id="waitingJobs" aria-live="polite">
      </div>
  </div>
</main>

<nav class="bottom-nav">
  <a class="navbtn" data-nav="home" href="home.html"><b aria-hidden="true">🏠</b>Home</a>
  <a class="navbtn" data-nav="receive" href="receive.html"><b aria-hidden="true">➕</b>Receive</a>
  <a class="navbtn active" data-nav="bench" href="bench.html"><b aria-hidden="true">🔧</b>Bench</a>
  <a class="navbtn" data-nav="work" href="work.html"><b aria-hidden="true">▶</b>Work</a>
  <a class="navbtn" data-nav="more" href="#" onclick="logout(event)"><b aria-hidden="true">☰</b>Logout</a>
</nav>
<script src="assets/js/app.js"></script>
</body>
</html>
